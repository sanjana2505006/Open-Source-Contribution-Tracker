services:
  - type: web
    name: osct
    runtime: node
    branch: main
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      # Agent (optional) — set in Render dashboard; never commit real keys
      - key: AGENT_PROVIDER
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AGENT_MODEL
        sync: false
      # Weekly digest email (optional — Resend)
      - key: RESEND_API_KEY
        sync: false
      - key: DIGEST_FROM_EMAIL
        value: "OSCT <onboarding@resend.dev>"
      - key: CRON_SECRET
        sync: false
      # Weekly cron: create a Render Cron Job (paid) or external scheduler that POSTs
      # /api/v1/digest/cron/weekly with Authorization: Bearer $CRON_SECRET
      # Local/manual: npm run digest:cron --workspace=@osct/api
