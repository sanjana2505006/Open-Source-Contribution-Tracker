services:
  - type: web
    name: osct
    runtime: node
    branch: main
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      # Agent (optional) — set in Render dashboard; never commit real keys
      - key: AGENT_PROVIDER
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AGENT_MODEL
        sync: false
